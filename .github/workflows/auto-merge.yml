name: Auto-merge low-risk PRs

on:
  pull_request:
    types:
      - labeled
      - unlabeled
  workflow_run:
    workflows:
      - 'ci'
    types:
      - completed


permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    uses: trade-tariff/trade-tariff-tools/.github/workflows/auto-merge-low-risk.yml@main
    with:
      label: low-risk
      merge-method: merge
    secrets:
      github-token: ${{ secrets.PULL_REQUEST_PAT }}
