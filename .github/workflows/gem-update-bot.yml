name: Gem Update Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  gem-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.3'
          bundler-cache: true

      - name: Update non-development gems
        run: |
          bundle update --jobs=4 --retry=3 --group default --group test --group production || true

      - name: Create PR
        run: |
          BRANCH="gem-update-$(date +%Y%m%d)"
          git config user.name "hermes-agent[bot]"
          git config user.email "hermes-agent[bot]@users.noreply.github.com"
          
          if git diff --quiet Gemfile.lock; then
            echo "No changes to Gemfile.lock"
            exit 0
          fi
          
          git checkout -b "$BRANCH"
          git add Gemfile.lock
          git commit -m "Update Gemfile.lock"
          git push -u origin "$BRANCH"
          
          gh pr create --title "Update Gemfile.lock"             --body "**Risk level:** 🟢 Green — Dependency bumps with no API changes (minor/patch gems)"             --label "dependencies"             --reviewer "trade-tariff/team-leads"
