name: ci

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  BUNDLE_JOBS: "3"
  BUNDLE_RETRY: "3"
  ECR_URL: 382373577178.dkr.ecr.eu-west-2.amazonaws.com/tariff-backend-production
  ENVIRONMENT: development
  IAM_ROLE_ARN: arn:aws:iam::844815912454:role/GithubActions-ECS-Deployments-Role
  PARALLEL_TEST_PROCESSORS: "5"
  PGHOST: localhost
  RAILS_ENV: test

permissions:
  contents: write
  id-token: write

jobs:
  check-pr-lines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: trade-tariff/trade-tariff-tools/.github/actions/check-pr-lines@main
        with:
          threshold: 600
          exclude-paths: |
            db/
            data/
            docs/
            spec/
            terraform/versions.tf
            *.md
            *.lock
            .github

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3'
      - uses: ruby/setup-ruby@v1.314.0
        with:
          bundler-cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.12.2
      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-tflint@main
      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-terraform-docs@main
        with:
          terraform_docs_version: 0.22.0
      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}
      - run: cd terraform/ && terraform init -backend=false -reconfigure
      - run: pip install pre-commit
      - run: pre-commit run --all-files --hook-stage pre-commit
      - run: pre-commit run --all-files --hook-stage pre-push
      - run: bundle exec brakeman

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: tariff_test
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ankane/setup-opensearch@v1
        with:
          opensearch-version: 2

      - run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - uses: ruby/setup-ruby@v1.314.0
        with:
          bundler-cache: true

      - name: Prepare test databases
        run: bundle exec rails db:test:prepare_parallel

      - name: Run tests
        run: |
          mkdir -p ctrf
          bundle exec parallel_test spec \
            -n "$PARALLEL_TEST_PROCESSORS" \
            --type rspec \
            --exec-args "sh -c 'PARALLEL_RSPEC_CHILD=true bundle exec rspec \"\$@\" --format progress --format Ctrf::RSpecFormatter --out ./ctrf/ctrf\${TEST_ENV_NUMBER:-1}.json' sh"

      - name: Check all public V2 controllers have swagger specs
        run: bundle exec rake swagger:check_coverage

      - name: Generate swagger docs
        run: bundle exec rake swagger:generate

      - name: Commit swagger docs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swagger/v2/swagger.json
          git diff --staged --quiet || git commit -m "Generate swagger/v2/swagger.json [skip ci]" && git push

      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@v1.0.28
        with:
          report-path: './ctrf/*.json'
          flaky-rate-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: always()
