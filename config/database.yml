default: &default
  adapter: postgres
  encoding: utf8
  # pool: 12
  search_path: <%= "#{ENV.fetch("SERVICE", "uk")}, public" %>

development:
  <<: *default
  host: <%= ENV.fetch('PGHOST', "localhost") %>
  user: <%= ENV.fetch("DB_USER", "postgres") %>
  database: tariff_development

test:
  <<: *default
  user: <%= ENV.fetch("DB_USER", "postgres") %>
  host: <%= ENV.fetch('PGHOST', "localhost") %>
  database: tariff_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
  # DB_POOL is derived by each process entrypoint from its own concurrency
  # setting, so Puma can follow MAX_THREADS and Sidekiq can follow
  # SIDEKIQ_CONCURRENCY without guessing process type here.
  pool: <%= Integer(ENV.fetch('DB_POOL', 6)) %>
